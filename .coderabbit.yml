# CodeRabbit Configuration
# https://coderabbit.ai

review:
  auto_title: true
  auto_approvals: false  # Manual approval still required
  comments:
    require_changes: false  # Can approve without changes
  labels:
    - "ai-reviewed"
  ignore:
    - "*.md"
    - "*.json"
    - ".env*"
    - "Dockerfile"
    - "docker-compose.yml"

bot:
  # Don't review trivial changes
  ignore_minor: true
  # Include security scanning
  security_scan: true
  # Summarize changes
  summary: true

# PR Review Instructions
instructions: |
  Review this PR for ClawForge trading bot.
  Focus on:
  - Risk management correctness (stoploss, trailing, position sizing)
  - API key handling (no secrets in code)
  - Telegram UX (0-Type UI consistency)
  - BingX API usage (rate limits, error handling)
  - No breaking changes to config schema

  Flag any:
  - Hardcoded values that should be config
  - Missing error handling
  - Potential race conditions in trade execution
