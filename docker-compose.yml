version: '3.8'

services:
  clawforge:
    build: .
    container_name: clawforge
    restart: unless-stopped
    mem_limit: 1g
    cpus: '1.0'
    networks:
      - claw-isolation
    volumes:
      - ./user_data:/app/user_data
      - ./configs:/app/configs:ro
      - ./strategies:/app/strategies:ro
      - ./generated:/app/generated
    environment:
      - BINGX_API_KEY=${BINGX_API_KEY}
      - BINGX_API_SECRET=${BINGX_API_SECRET}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
      - STEPFUN_API_KEY=${STEPFUN_API_KEY}
      - TZ=Asia/Singapore
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "python", "-c", "import freqtrade; print('OK')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

networks:
  claw-isolation:
    driver: bridge
